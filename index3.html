<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Halaman 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            overflow: hidden;
        }

        /* Container utama pembungkus video dan konten */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        /* Video sebagai latar belakang penuh */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Wrapper untuk memposisikan semua tombol di tengah layar */
        .content-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 20px; /* Jarak antar tombol */
            text-align: center;
        }

        /* Gaya umum untuk tombol */
        .content-wrapper a {
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 20px;
            transition: transform 0.2s;
        }

        .content-wrapper a:hover {
            transform: scale(1.05);
        }

        .btn-web {
            color: white;
            border: 2px solid white;
        }

        .btn-vip {
            color: #faf400;
            border: 2px solid #faf400;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Video Latar Belakang -->
        <video class="bg-video" autoplay loop muted playsinline>
            <source src="3d.mp4" type="video/mp4">
            Browser Anda tidak mendukung video HTML5.
        </video>

        <!-- Konten Tombol di Tengah -->
        <div class="content-wrapper">
            <a href="web1.html" class="btn-web">PERGI KE WEB</a>
            <a href="index4.html" class="btn-vip">👑 Beli VIP 👑</a>
        </div>
    </div>

</body>
</html>
