<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Login</title>
    
    <!-- Bagian CSS untuk mempercantik tampilan -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }

        .login-container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        input:focus {
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        #message {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        .login-container a {
          text-align-last: center;
          text-decoration: none;
          color: black;
        }
    </style>
</head>
<body>

    <!-- Bagian HTML Struktur Form -->
    <div class="login-container">
        <h2>Masuk ke cpu-r</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Masuk</button>
        </form>
        <p id="message"></p>
        <a href="whatsapp://send?phone=6281353839530&text=halo admin saya ingin login ke web anda">👾Ingin login? pencet ini👾</a>
    </div>

    <!-- Bagian JavaScript Logika Login -->
    <script>
const loginForm = document.getElementById('loginForm');
const messageText = document.getElementById('message');

loginForm.addEventListener('submit', function(event) {
    event.preventDefault(); 

    const emailInput = document.getElementById('email').value;
    const passwordInput = document.getElementById('password').value;

    // Pengecekan Akun 1 ATAU Akun 2
    const akun1 = (emailInput === "admin@email.com" && passwordInput === "password123");
    const akun2 = (emailInput === "user@email.com" && passwordInput === "user123");
    const akun3 = (emailInput === "budi@email.com" && passwordInput === "budi789");

    if (akun1 || akun2 || akun3) {
        messageText.style.color = "green";
        messageText.textContent = "Login berhasil! Memuat....";
        window.location.href = "index3.html";
    } else {
        messageText.style.color = "red";
        messageText.textContent = "Email atau password anda salah!";
    }
});

    </script>

</body>
</html>
